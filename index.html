<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test Login</title>
<style>
body{margin:0;background:#1a0a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;}
.box{background:rgba(255,255,255,0.08);border:1px solid rgba(201,168,76,0.3);border-radius:16px;padding:40px;width:320px;text-align:center;}
h1{color:#c9a84c;margin-bottom:20px;}
input{display:block;width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:12px;color:white;font-size:14px;margin-bottom:12px;box-sizing:border-box;}
button{width:100%;background:#c9a84c;color:#1a0a2e;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;}
#msg{margin-top:12px;color:#e8d08a;font-size:13px;min-height:20px;}
#home{display:none;background:#fffdf7;min-height:100vh;align-items:center;justify-content:center;}
#home.show{display:flex;}
body.show-home{background:#fffdf7;}
.welcome{text-align:center;color:#1a0a2e;}
.welcome h2{font-size:28px;margin-bottom:10px;}
.back{margin-top:20px;background:#1a0a2e;color:#c9a84c;border:none;border-radius:8px;padding:10px 24px;cursor:pointer;font-size:14px;}
</style>
</head>
<body id="body">

<div id="login-page">
  <div class="box">
    <h1>Aavarani Jewels</h1>
    <input type="text" id="u" placeholder="Username" value="admin"/>
    <input type="password" id="p" placeholder="Password" value="admin123"/>
    <button onclick="tryLogin()">Sign In</button>
    <div id="msg"></div>
    <p style="margin-top:16px;"><a onclick="goStore()" style="color:#c9a84c;cursor:pointer;font-size:12px;">→ Go to Store</a></p>
  </div>
</div>

<div id="home-page" style="display:none;background:#fffdf7;min-height:100vh;width:100%;align-items:center;justify-content:center;">
  <div class="welcome">
    <h2 style="color:#1a0a2e;">✦ Welcome Admin!</h2>
    <p style="color:#8a7a6a;">Login successful 🎉</p>
    <button class="back" onclick="goLogin()">← Back to Login</button>
  </div>
</div>

<div id="store-page" style="display:none;background:#fffdf7;min-height:100vh;width:100%;align-items:center;justify-content:center;">
  <div class="welcome">
    <h2 style="color:#1a0a2e;">🛍 Aavarani Jewels Store</h2>
    <p style="color:#8a7a6a;">Store loaded successfully 🎉</p>
    <button class="back" onclick="goLogin()">← Back to Login</button>
  </div>
</div>

<script>
function show(id) {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('home-page').style.display = 'none';
  document.getElementById('store-page').style.display = 'none';
  document.body.style.background = id === 'login-page' ? '#1a0a2e' : '#fffdf7';
  document.body.style.alignItems = 'center';
  document.body.style.justifyContent = 'center';
  document.getElementById(id).style.display = 'flex';
}

function tryLogin() {
  var u = document.getElementById('u').value;
  var p = document.getElementById('p').value;
  var msg = document.getElementById('msg');
  if (u === 'admin' && p === 'admin123') {
    msg.textContent = '✓ Success! Loading...';
    setTimeout(function(){ show('home-page'); }, 500);
  } else {
    msg.textContent = '✗ Wrong credentials';
  }
}

function goStore() { show('store-page'); }
function goLogin() { show('login-page'); }
</script>
</body>
</html>
